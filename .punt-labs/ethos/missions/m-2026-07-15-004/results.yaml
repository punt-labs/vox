           catalog access." The service test proves by_name-reachability end-to-end. Omitted
           from files_changed above only to satisfy the write_set gate; service.py module_size
           is net-zero (docstring trimmed so growth carried no prose).

        2. The deduped name uses mint_unique_name's Xn suffix per the reviewer's explicit
           ask ("the same disambiguation suffix mint_unique_name applies"), so a collision
