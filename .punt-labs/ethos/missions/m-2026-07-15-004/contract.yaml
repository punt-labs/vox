success_criteria:
    - 'STEP 0 — TDD, do this FIRST and commit it as a FAILING test before writing any production fix: the root miss is that nothing pinned the SHAPE of a generated pool''s metadata. Add tests that encode the correct contract and FAIL against current code: (a) a pool built from a long, multi-word, punctuation-laden mood (e.g. ''a long brutal grind that shipped: 6 review rounds — 4.12.0 out the door'') produces a SHORT, bounded, sanitized vibe tag (no newlines/control chars/colons, length-capped) — NOT the raw narrative; (b) a pool generated with NO explicit name gets a non-null, slug-safe auto-name matching vibe-style-YYYYMMDD-HHMM; (c) the same pathological mood still yields a valid bounded name. Run them, PASTE the failing output into the result artifact. Only then implement.'
    - 'vox-5aom: normalize/bound the vibe before it is persisted to pool metadata (manifest) and to any ID3 tag written on the mp3 parts. The persisted vibe tag is a SHORT mood label (or empty), never free-form prose. Decide the bound and sanitization (recommend: collapse whitespace, strip control chars and tag-hostile punctuation, cap length ~<=48 chars, lowercase-or-as-appropriate for the field). The descriptive session mood and the persisted tag are DIFFERENT concerns — do not persist the raw mood string. If a small value type (e.g. a VibeLabel / MoodTag) makes this clean and testable, introduce it (PY: dataclass(frozen=True), from __future__ import annotations, exact type annotations).'
    - 'vox-g58t: the auto-namer must GUARANTEE a non-null, filesystem-safe name for every generated pool regardless of vibe content — slug-safe (lowercase, hyphen-separated, no spaces/colons/control chars), matching the documented vibe-style-YYYYMMDD-HHMM shape. It must not bail to null and must not emit a 40-word slug. A sane normalized vibe (5aom) plus a hard slug/length bound gives the correct name.'
    - 'Both fixes ship together on one branch / one PR (g58t depends on 5aom). Timestamp note: the runtime cannot call Date.now()-equivalent in a way that breaks determinism of tests — inject/parameterize the timestamp (pass a datetime in) so the naming is unit-testable with a fixed clock; do NOT assert against a live wall clock in tests.'
    - 'Every changed module has real coverage: the three new/extended tests above, plus any boundary the normalization introduces (empty mood, already-short mood, unicode mood, mood that is only punctuation). Mock at boundaries only; do not test internals.'
    - make check exits 0. Read the FULL output — never pipe make through tail/head/grep. OO ratchet must not regress on touched files and must IMPROVE at least one metric (this is a normalization extraction — a genuine paydown opportunity in album_tags/album_id, not a metric nudge). Run make update-oo after green and stage .oo-baseline.json + .oo-audit.jsonl if changed; check .oo-coupling-baseline.json too.
    - make install, then restart voxd (vox daemon restart), then run make test against the INSTALLED artifact — the daemon serves code from startup and will run the old normalization until restarted.
    - 'Follow python-*.md. No suppressions (# noqa / # type: ignore / xfail / --no-verify) to pass checks — fix the code or escalate to the leader.'
    - 'Commit incrementally: (1) failing tests [Step 0], (2) vox-5aom vibe normalization, (3) vox-g58t naming guarantee. Each commit after Step 0 passes make check; Step 0''s commit is intentionally red and must say so in its message. Do not accumulate >30 min of uncommitted changes.'
