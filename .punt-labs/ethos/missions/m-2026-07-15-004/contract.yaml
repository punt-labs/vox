context: |
    ## Goal

    Fix two linked defects in generated music-pool metadata, TDD-first, shipping
    as one PR. Root cause is shared: the auto-vibe MOOD text (a long session
    narrative, fine for coloring ~5 words of TTS delivery) is persisted verbatim
    as a pool's 'vibe' tag, and the auto-namer — which builds the pool name from
    vibe + style + timestamp — then bails to null rather than emit a 40-word slug.

    ## Evidence (real manifest from 2026-07-15T03:56, style trance)

        "tags": {
          "style": "trance",                      <- correct
          "vibe": "a long brutal grind that shipped: 6 review rounds, a release
                   that misfired twice, recovered by reading the code, 4.12.0 out
                   the door — and this very nudge just proved itself firing live",
          "name": null                            <- should be trance-20260715-0356
        }

    style is right. vibe is a 40+-word narrative (wrong shape for metadata and for
    an ID3 comment/genre frame). name is null (contract says auto-name on
    generation, vibe-style-YYYYMMDD-HHMM).

    ## Why TDD

    The miss is a TEST-COVERAGE gap: tests/programs/{test_album_tags,test_album_id,
    test_manifest}.py exist but none asserted the SHAPE of the persisted vibe tag
    or that the name is non-null and slug-safe. Had they, both defects fail at CI.
    So Step 0 is: write those assertions as FAILING tests, prove they fail against
    today's code (paste the red output), THEN implement. This is non-negotiable
    ordering.

    ## Where things live (scoping only — you own the exact edits)

    - album_tags.py / album_id.py — build the pool's tags (style/vibe/name) and id.
    - manifest.py — the persisted pool manifest (the JSON shown above).
    - part_tags.py — per-part (mp3) tags; check whether the vibe reaches ID3 here.
    - on_handler.py / music_producer.py — where a pool is created and the current
      vibe/mood is read in and seeded. Trace where the raw mood enters.
    Find the true seams. You may introduce a small frozen value type for the
    bounded label if it makes the normalization cohesive and testable.

    ## Constraints / invariants

    - Daemon-side (voxd). voxd logs to stderr only — logger.*, never print().
    - This is value NORMALIZATION at a persistence boundary, not a state-machine
      change — no Z model needed (the playlist state machine in
      docs/music-playlist.tex is unaffected; do not touch it).
    - Determinism: inject the timestamp for naming so tests use a fixed clock.
    - Do not change the user-facing panel CX or the style tag.
    - Keep the vibe tag EMPTY rather than emit junk if a mood normalizes to
      nothing usable — empty is valid; prose is not.

    ## Deliverable

    Branch fix/vox-5aom-music-metadata-normalization, commits: (1) failing tests,
    (2) vox-5aom normalization, (3) vox-g58t naming guarantee. make check green
    from commit 2 on, OO baseline refreshed, tests run against the installed +
    restarted daemon. Leader handles CHANGELOG, PR, review.
