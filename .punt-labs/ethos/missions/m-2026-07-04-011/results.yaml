        layout rather than tests/test_music_scheduler.py / test_music_generator.py;
        updated tests/test_voxd.py + tests/test_voxd_track_gen.py for the new track
        naming; surgically updated .oo-baseline.json / .oo-coupling-baseline.json
        scheduler entries for the documented structural shift.

        Preserved: /music on --name replay, /music play, gapless handoff, off path,
        and MusicLoop (untouched). Rotating an established pool makes no API call.
