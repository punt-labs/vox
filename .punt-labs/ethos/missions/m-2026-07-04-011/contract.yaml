context: |
    Operator feedback: background music is too repetitive. Two root causes, confirmed by a codebase trace: (1) generated tracks ARE saved to ~/Music/vox/tracks/*.mp3 but nothing ever plays them back as a playlist — every /music next and vibe-change unconditionally calls the ElevenLabs API for a fresh track; a single track just loops until you skip. (2) the generation prompt is essentially fixed for a given (vibe, style): music.py vibe_to_prompt has 4 layers, but the work-intensity layer is fed a hardcoded signals=[] (always "steady working pace") and the time layer only shifts 4x/day — so every generated track lands in the same sonic territory. Operator-approved design (all four decisions made): - PLAYLIST ROTATION: treat the already-saved files, grouped by the existing
      "<vibe_slug>-<style_slug>-" filename prefix, as the pool (NO new storage/index).
      When the pool for the current (vibe,style) has >=12 tracks, pick one by SHUFFLE
      (never the track that just played) and play it with NO API call; when the pool has
      <12, generate a new one (LAZY fill). MusicLoop already handles the replay path, so
      it should not need changes.
    - DISTINCTNESS: add a curated variation dimension to the prompt so the 12 tracks are
      genuinely different, not 12 near-clones. generate() passes a variation index =
      current pool size, so the 1st..12th track each get a different descriptor.
    You own the decomposition and the exact variation-descriptor wording. Keep the scheduler the domain facade (the loop stays agnostic); keep the generator the I/O helper. Do not change the cache key, the gapless-handoff invariant, or --name/replay and /music play behavior.
