        mechanism is preserved and it writes nothing. The vibe_signals field became
        vibe_nudge_turns: int with a VoxConfig.coerce_turns validator; VibeChange
        resets it on any mode change and both the CLI and MCP paths route through it.

        Four scoped, justified ratchet relaxes recorded in the audit (config.py
        module_size / class_to_func_ratio for the int-coercion feature; server.py
        method_ratio / avg_params for the deleted property; __main__.py coupling for
        the shared VibeChange import, 12 < the CLI limit of 15). Did not touch
        DESIGN.md / README.md / CHANGELOG.md / commands/vibe.md. No PR opened.
