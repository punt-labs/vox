        Three green commits on feat/vibe-exit-code (be2ba42, f0199b6, e00a657).

        VIBE_NUDGE_REMINDER lives in vibe_nudge.py beside VibeNudge, not in quips.py
        as the design suggested: it is silent injected context, not speech, so
        co-locating it (PY-OO-7) is more cohesive and kept quips.py module_size flat
        (the quips placement regressed the ratchet with no offset). quips.py ended
        unchanged.

