context: |
    silent-failure-hunter flagged during the vox-qogn review: ProcessManager.find_pid_on_port (src/punt_vox/service/process.py, ~lines 81-83) catches and swallows lsof/fuser subprocess errors and timeouts, returning [] with no log. Consequence: if the port-probe tool fails or times out, a genuinely surviving voxd daemon reads as "no survivor", so both the uninstall survivor-check (_stale_daemon_survives, added in vox-qogn) and ensure_port_free silently pass. is_vox_daemon_process already logs a WARNING when its ps call fails; find_pid_on_port should do the same so the detection's best-effort nature is visible, not silent. The sibling method is the pattern to match. Also fold in two low test-hardening items from the qogn review.
