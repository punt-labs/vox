      prose: |
        Branch fix/surface-detection-tool-failures, 3 commits off main.

        find_pid_on_port distinguishes a probe-TOOL FAILURE from a genuinely
        EMPTY port by WHERE the [] originates:

          - Tool failure: subprocess.run raises OSError (missing lsof/fuser) or
            subprocess.TimeoutExpired. Caught -> logger.warning naming the tool
            (cmd[0]) and the exception via lazy %-args -> return []. This mirrors
            is_vox_daemon_process's ps-failure warning.
          - Genuinely empty: subprocess.run returns cleanly with a non-zero exit
            code or empty stdout (lsof/fuser exit 1 when nothing is on the port).
            Falls through to `return []` with NO log.

        The old code wrapped the whole body in one try/except that swallowed both
        cases into a silent []. Splitting the except out of the success path is
        what makes the two distinguishable. Return value is unchanged in every
        case (always list[int]); only the tool-failure path is now observable.

        Restructuring the method (early-return on failure + comprehension) also
        dropped a redundant parsing comment already covered by the docstring,
        lowering process.py module_size 187->186 (OO ratchet IMPROVED, no
        regressions). Baseline rebaselined in a trailing chore commit (touches
        no src file, so the HEAD~1..HEAD ratchet trivially passes).

