          status: pass
      prose: |
        Round-2 finding from silent-failure-hunter, addressed.

        str.isdigit() returns True for Unicode superscript/subscript digits
        (e.g. "²", U+00B2) that int() rejects with ValueError. The prior commit
        removed the ValueError catch from find_pid_on_port on the premise that
        the isdigit() guard made it unreachable -- but that was true only
        because lsof/fuser happen to emit ASCII. The guard was safe by luck of
        input, not by construction.

        Fix: change token.isdigit() to token.isdecimal(). str.isdecimal() is a
        strict subset of the decimal characters int() accepts, so the guard is
        now total -- int(token) can never raise -- and the removed catch is
        truly dead, not dead-by-accident.

        Also single-sourced the duplicated result.stdout.strip() into a local
        (`out`), a genuine DRY improvement that dropped process.py module_size
        186->185 (OO ratchet IMPROVED, no regressions), and added a regression
        test (test_find_pid_on_port_ignores_non_decimal_digits) that feeds a
        superscript token: it would raise an uncaught ValueError under the old
        isdigit guard, and is silently dropped under isdecimal.

        Commits:
          ee0ca62 fix(service): use isdecimal so the PID guard is total
          5c38347 chore(oo): rebaseline process.py module_size 186->185

        make check: exits 0 (lint, type, docs, 1717 tests, check-oo IMPROVED,
        check-coupling PASS, suppression ratchet -2).
