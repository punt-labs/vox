context: |
    ## Goal

    Ship the ratified vox-2594 fix: one vox.log receives daemon records and
    every client record, including hooks that do no daemon work. The design
    of record is docs/vox-2594-unified-log.md (committed 31e09be) with the
    Z model docs/vox-2594-log-rotation.tex (fuzz-clean, verified by leader).
    The fdmm ship transport and vox-fallback.log are deleted outright.

    ## Non-negotiable invariants (from the design, operator-ratified)

    1. One vox.log for daemon + every client record incl. skip-path hooks.
    2. No daemon round-trip on any hook's logging hot path (DES-017).
    3. Rotation safe under concurrent writers: no lost or torn line, no
       write to a renamed file, at most one rotator (flock protocol).
    4. 0600 on vox.log and every backup (cn0p).
    5. No fallback file, no migration/compat/shim code.
    6. Persistent-file observability, never stderr-only (DES-046).

    ## Cautions

    - emit() never raises and never re-enters logging; sink I/O errors go
      to sys.__stderr__ (AtomicAppendLog already behaves this way).
    - Single sanitization pass: handler renders LOG_FORMAT plain,
      AtomicAppendLog.append applies SANITIZER to the whole line.
    - Never Read/Write/Bash .punt-labs/vox/vox.md or vox.local.md; never
      touch .punt-labs/ethos/.
    - hooks.py is in the write_set only for import/reference fixes if the
      deletions require them — no behavioral changes there.
