context: |
    ## Goal (design phase)

    The operator wants a mood change to re-pool the music when music is already
    playing. Today server.py's vibe tool deliberately does NOT do this (it treats
    the session vibe as display/record state and reserves music retunes for
    explicit /music commands). The operator has decided to reverse that: a mood
    change should switch the music — but ONLY when a Program is already playing,
    and with NO confirmation/credit guard (the re-pool is intended).

    This is a stateful subsystem change (the music playlist state machine), so it
    needs a Z-model extension and a DES ADR BEFORE any implementation. You are
    producing the design, not the code.

    ## The crux for leader review

    The one genuinely open question is prompt authoring on a NEW-pool generate:
    voxd never invents a genre, so a generate needs 12 authored (vibe,style)
    prompts. Recommend the routing (agent /vibe flow authors them, vs daemon
    fallback), with the trade-off. The leader will review your recommendation and
    escalate to the operator before implementation dispatches.

    ## Constraints / invariants

    - Coupling gated on 'Program playing' — a mood change with music off is a
      music no-op (only mood/tags update).
    - No confirmation, no credit guard.
    - Preserve the playlist invariants (pool <= 12, at most one fill, playing in
      pool, no immediate repeat, generation only below full).
    - voxd logs to stderr; daemon owns playback; the client/agent authors prompts.
    - No migration/compat/shim code — reverse the old no-coupling path outright.

    ## Deliverable

    design/vox-q1z4 branch with: extended fuzz-clean audio-programs Z model, a DES
    ADR, and a write-set + test-plan + prompt-authoring recommendation note. The
    leader reviews, escalates the prompt-authoring decision to the operator, and
    only then dispatches implementation.
