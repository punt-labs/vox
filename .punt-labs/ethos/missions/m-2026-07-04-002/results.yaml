      prose: |
        Made cache HIT vs MISS observable end to end without changing caching
        behavior (key/hit-miss decision/audio unchanged).

        Signal design (typed, minimal protocol change):
        - New typed result: SynthesisOutcome(path: Path, cached: bool) in a
          dedicated module src/punt_vox/voxd/synthesis_result.py. synthesize_to_file
          now returns it instead of a bare Path.
        - voxd logs distinct INFO lines on the synthesize path: "cache HIT: ...
          file=<cache path>" and "cache MISS: ... file=<cache path>" (stderr-only,
          no print). The MISS log also covers the former "synthesize done" line
          (one INFO per synthesis). The api_key-bypass MISS notes "cache bypassed".
        - The daemon carries the fact on the wire: SynthesizeHandler puts
          "cached": <bool> on the 'playing' response (the terminal the client
          returns on).
        - client.py: SynthesizeResult gained a typed field `cached: bool = False`,
          populated from the terminal response.
        - server.py: the unmute MCP result entry carries "cached": result.cached,
          so a caller/model can assert the hit directly.

        Response field name/shape chosen: boolean `cached` -- wire key "cached" on
        the 'playing' response; client SynthesizeResult.cached; MCP unmute result
        entry["cached"].

        Boundary tests exercise daemon-response -> client -> MCP, not just the
        in-process cache:
        - Pipeline (real temp cache, counting synth): MISS then identical HIT flips
          cached false->true and the HIT does not re-synthesize; a different voice
          (different key) is a MISS; per-call api_key bypass is a MISS.
        - Handler: 'playing' response carries cached for hit and miss.
        - Client: a 'playing' frame with cached=true/false surfaces as
          SynthesizeResult.cached.
        - Server: unmute result JSON carries cached=true/false.

        make check exits 0. OO ratchet satisfied by improving synthesis.py
        module_size (406->404) via extraction + log consolidation, with no
        regressions; coupling offset by dropping the playback._monotonic edge for
        stdlib time.monotonic. Did not run update-oo/rebaseline: the pass depends
        on a pending improvement vs the committed baseline, which rebaselining
        would erase -- baseline decisions belong to the leader at merge.
