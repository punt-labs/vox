      prose: |
        Design for the self-driving-playlist rebuild. bas7's bug was one gen_task
        doing two jobs; the fix splits generation supply (new PoolFiller, one
        cancellable sequential task), the next-track decision (pure
        scheduler.select_next_track), and advance-on-end wiring (a much smaller
        MusicLoop). Auto-advance is TrackPool.pick_next over the current on-disk
        pool: loops #1 while it is the only track, advances once fill lands #2,
        rotates shuffle-avoid-last at 12. Prefetch is a consequence of fill running
        ahead, not separate machinery. The same decomposition that moves loop.py's
        two failing OO metrics to passing is what makes the experience testable in
        isolation — the operator's two goals reinforce, as detailed in the OO PLAN.
