        Behavior-preserving Split Module (PY-RF-3). HealthTarget (host/port/token
        resolution for the post-install health poll) moved into the new
        service/health.py; installer.py imports it and keeps the poll loop in
        _verify_serving. The old private class was deleted in the same commit that
