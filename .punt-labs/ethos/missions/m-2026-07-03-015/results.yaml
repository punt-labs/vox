      prose: |
        Round 2 commit 0d27433 on refactor/service-oo-typing-cleanup.

        Concern 1 (routing, High). stop_daemon (service/__init__.py), _stop and _start
        (daemon_restarter.py) took str, discarding the PlatformName narrowing their
        callers already establish (detect_platform / _detect_platform). Widened all
        three to PlatformName — pure param tightening, zero call-site changes. Matters
        most for _start, which dispatches launchctl vs systemctl on the value.

        Concern 2 (drift-proofing). Every two-way platform branch used 'else' as "the
        other platform", so a 3rd PlatformName member would silently mis-route. Made
        the second arm explicit and added assert_never(plat) on the unreachable
        trailing branch at all six sites: installer.install/uninstall/is_running,
        stop_daemon, _start, and health._effective_bind (rewritten as a match).
        install() also drops the redundant plist/unit ternary for the computed
        service_path.

        Exhaustiveness proof: temporarily adding "windows" to PlatformName makes mypy
        error at all six assert_never sites (health.py:86, installer.py:220/261/290,
        __init__.py:80, daemon_restarter.py:134) — "Argument 1 to assert_never has
        incompatible type Literal['windows']; expected Never". Reverted after proving.
        make check green; mypy + pyright both see the branches as exhaustive.
