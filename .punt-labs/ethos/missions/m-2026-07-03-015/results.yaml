      prose: |
        Two commits on branch refactor/service-oo-typing-cleanup off main.

        480ed7d refactor(service): rehome _voxd_exec_args onto ServiceInstaller (vox-376k)
          The module-level _voxd_exec_args free function became a ServiceInstaller
          @staticmethod. Backends now receive the bound self._voxd_exec_args; install()
          calls the method. installer.py class_to_func_ratio 0.5 -> 1.0,
          method_ratio 0.909 -> 1.0, module_size 248 -> 246. test_service_process.py
          updated to call ServiceInstaller._voxd_exec_args.

        7b6ce3d refactor(service): single-source PlatformName platform domain (vox-n0b6)
          New src/punt_vox/service/types.py defines
          `type PlatformName = Literal["macos", "linux"]` (PEP 695). Used at all five
          inline sites (health.py x3, installer.py x2) and the two public wrappers
          (service/__init__.py detect_platform, daemon_restarter.py _detect_platform)
          now return PlatformName instead of str. PlatformName is annotation-only, so
          every importer guards it under TYPE_CHECKING (PY-TS-7): this keeps runtime
          efferent coupling flat and holds installer.py at 7 (the PL-CU-1 ceiling) —
          a plain import would push it to 8, crossing the absolute threshold. Added
          the whitespace-padded concrete VOXD_BIND cell to test_service_health.py.

        Baseline handling. The coupling baseline was already RED on main before this
        branch (hooks.py, installer.py, dirs.py, hook_payload.py, voxd drift vs a
        stale baseline — verified by stashing the 376k change; make check was red on
        a clean checkout). 376k reset it via --rebaseline; all reconciled values sit
        within absolute PL-CU thresholds. n0b6 needed no further coupling change —
        the TYPE_CHECKING guards keep every module's efferent flat. For OO, the new
        shared module adds a 2-line TYPE_CHECKING block to health.py/__init__.py/
        daemon_restarter.py (module_size +2 each, all < 300) — a structural move
        within threshold, reconciled via --rebaseline; service/types.py is held out
        of the OO baseline so the ratchet records the new module as the round's
        improvement (check-oo requires a strict improvement on a touched file).

        make check exits 0 on the committed HEAD.
