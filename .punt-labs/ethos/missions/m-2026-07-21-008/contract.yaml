context: |
    ## Why now

    The remote setup is documented (docs/guide-remote-setup.md) and #351 made
    `vox record` write daemon-side — which created a P1 arbitrary-write primitive
    (vox-zu39) and left the remote record->play loop incoherent (play still runs
    client-side; no way to reference/retrieve a daemon-side recording). This
    design closes the security hole and makes the loop coherent in one pass. It
    is the daemon-is-audio-host epic (vox-dvri): the daemon owns audio files and
    playback; clients are thin controllers that never dictate a daemon-side
    absolute path and never do remote playback locally.

    ## Trust model (state it, design to it)

    voxd may serve REMOTE clients that hold the token but live in a different
    trust domain (machine B, per the guide). The token authorizes audio
    operations. It must NOT grant filesystem writes as the daemon user. Any
    design that lets a wire client choose a daemon-side absolute write path fails.

    ## Constraints

    - Forward integration, no migration/compat/shim. The #351 output_path/
      output_dir absolute-path contract is superseded, not bridged.
    - Local (loopback) ergonomics matter: do not regress `vox record`/`vox play`
      for the common single-machine user.
    - voxd logs to a file, never stderr/print.
    - Never Read/Write/Bash .punt-labs/vox/vox.md or vox.local.md; never touch
      .punt-labs/ethos/.

    ## Deliverable

    A committed design (+ Z spec if triggered) an implementation mission can
    execute. The leader reviews it, escalates the local-vs-remote/security-model
    decision to the operator, then dispatches implementation. Security-priority.
