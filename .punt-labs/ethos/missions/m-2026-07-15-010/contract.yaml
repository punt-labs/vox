context: |
    ## Goal

    Revive the ♪ music panel's DJ personality ("fun is a feature") — the operator
    explicitly asked for it. Design of record: DES-044 in DESIGN.md, which carries
    the DECISION and the exact curated phrase pools. Read it first.

    ## Background (why the fun was missing)

    The music MCP tools (`server.py`) return only `{message, applied}` /
    `{message, programs}` — NO `.status`/`.style`/`.name`/`.tracks`. The hook's DJ
    phrase pools branched on those nonexistent fields, so they were dead code and
    the panel silently showed a generic line. vox-lf6b corrected the hook to echo
    the server's plain `.message`. The fix here is DES-044's option A: the SERVER —
    the one place that holds the real action + style + name — authors the flavored,
    randomized line; the hook stays a dumb `.message` echo; the dead hook pools are
    deleted.

    ## Seams (scoping — you own the exact decomposition)

    - `src/punt_vox/quips.py` — the immutable phrase-pool registry (existing pools
      are `tuple[str, ...]`). Add the DJ pools here or in a sibling music-phrases
      module — your call.
    - `src/punt_vox/server.py` — music (line ~653), music off (~656), music_play
      (~690), music_next (~739): each builds `message = f"♪ {outcome.display(<fallback>)}"`.
      The `<fallback>` string is where the DJ phrase goes. `generating_message` is at
      ~198. Decide the cleanest composition (a small helper that picks + interpolates,
      the injectable chooser for tests).
    - `hooks/suppress-output.sh` — delete the dead `music`/`music_play` DJ pools and
      their field-branching; keep the `.message` echo.

    ## Invariants

    - Hook is a display surface, not a content generator — no hook-side branching on
      fields the tools do not emit.
    - Keep vox-lf6b intact: STOP_NARRATION control/reply split, error guard,
      bare-string guard, printf'd jq pipes.
    - Keep vox-5aom intact: the panel uses style/name, never the raw session mood.
    - Randomized per call, but tests are deterministic via an injected chooser.
    - Panel line ≤ 80 cols after the ♪ prefix.

    ## Deliverable

    DJ-flavored, varied music panel lines authored server-side, the dead hook pools
    gone, tests locking pool membership + interpolation + the radio/no-style paths.
    make check green, daemon restarted + tested against the installed wheel. The
    leader handles CHANGELOG, PR, and review.
