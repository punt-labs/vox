context: |
    ## Goal

    Ship the vox-tnum size fix: vox record of arbitrarily long text works, no
    1 MiB WebSocket frame ceiling. Design of record: docs/vox-tnum-record-
    transport.md (committed c9cc6e5), candidate C — the daemon writes the file
    and returns the path; no audio crosses the wire.

    ## Why candidate C (settled, operator-aware)

    record's purpose is to produce a file; the daemon already owns every other
    audio file on disk (cache, tracks, ephemeral). Writing the record file
    daemon-side removes the byte transfer entirely — no frame to cap, no receive
    buffer to bound. It also fits the coherent "daemon is the audio host" model
    the follow-on beads complete (vox-ovb7 routes play through the daemon;
    vox-eoq9 labels remote paths). This mission implements ONLY the record
    transport for the local/loopback case.

    ## The four defects (all reproduced live 2026-07-20)

    1. 3,072,047-byte reply frame > client 1 MiB max_size -> close 1009.
    2. Fresh 6000-char synthesis took 2m04s; client 30s timeout fired first;
       daemon finished with no receiver, no file written.
    3. websockets ConnectionClosedError escaped the CLI's VoxError catch as a
       raw rich traceback.
    4. Daemon raised AssertionError in the websockets drain when the client
       closed mid-transfer (uvicorn.error: data transfer failed).

    ## Cautions

    - The daemon logs to a file, never stderr/print (voxd is a daemon).
    - emit/reply guards must never raise; a client vanishing is normal.
    - Never Read/Write/Bash .punt-labs/vox/vox.md or vox.local.md; never touch
      .punt-labs/ethos/.
