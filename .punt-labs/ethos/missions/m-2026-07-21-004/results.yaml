      prose: |
        Implemented candidate C exactly. The daemon writes the synthesized MP3 to the caller's destination and returns {type:audio, path, bytes, cached}; no audio crosses the WebSocket, so the 1 MiB single-frame ceiling is gone by construction. Commit a87269a on fix/vox-tnum-record-transport.
        All four defects fixed: (1) transport -- path-return removes the big frame; (2) timeout -- RecordHandler sends an immediate 'recording' ack, then the client waits for the terminal 'audio' frame under a length-scaled deadline (60 + 0.05*len(text) s; 6000 chars -> 360 s, over the observed 124 s), so a long synthesis is never abandoned; (3) CLI errors -- the transport wraps websockets ConnectionClosed/WebSocketException and OSError from ws.send()/ ws.recv() into VoxdConnectionError/VoxdProtocolError in _send_frame/_recv_frame, so every failure is a one-line CLI error; (4) daemon crash -- no large in-flight frame plus suppress(WebSocketDisconnect, RuntimeError) on the record reply. Atomic write: copy to a sibling temp then Path.replace; cache hits are copied (source preserved), fresh ephemeral sources removed after landing, so a synthesis error leaves no partial file.
        Forward-integration, no shim: deleted recording.py (RecordingSink) and test_recording.py; file-write + generate_filename naming moved daemon-side into RecordSink. VoxClient.record changed shape from returning bytes to RecordResult(path, byte_count, cached); both callers (CLI record command, MCP record tool) changed with it. No base64 path remains.
        Two structural extractions were required to keep the ratchets green: RecordHandler split into its own module (record_handler.py) because record_sink pushed speech_handlers past the efferent-coupling hard cap of 7; and the daemon's handler-dict wiring extracted to HandlerRegistry (handler_registry.py), which dropped the daemon's efferent coupling from 16 to 12 (turning a +1 regression into a -4 improvement). Transport gained _send_frame/_recv_frame helpers, cutting send_and_drain complexity (client max_complexity 9->8) and removing the send/recv wrapping duplication.
        Tests assert the invariants by name: test_long_record_delivers_byte_correct_file, test_record_over_frame_limit_succeeds, test_arbitrarily_long_record_has_no_ceiling, test_long_synthesis_is_not_abandoned (covered via the length-scaled timeout unit path), test_client_close_mid_transfer_does_not_crash_daemon, test_transport_failure_is_one_line_cli_error, test_no_partial_file_on_synthesis_error.
        WRITE-SET DEVIATIONS (files_changed above is scoped to write_set members; these additional paths were also changed and need the write_set amended -- all necessary and gate-driven, flagged to the leader): - NEW src/punt_vox/voxd/record_handler.py (+118): RecordHandler split into its own
          module because record_sink pushed speech_handlers past the efferent-coupling hard
          cap of 7 (non-relaxable). The design gave the specialist latitude on decomposition.
        - NEW src/punt_vox/voxd/handler_registry.py (+73): daemon handler-dict wiring
          extracted here; dropped daemon efferent coupling 16->12 (offsets the +1 the split
          would have added to the daemon).
        - src/punt_vox/voxd/daemon.py (+8/-40): imports HandlerRegistry, RecordHandler from
          the new modules; _build_handler_dict removed.
        - NEW tests/test_voxd_record_handler.py (+158) and tests/test_voxd_record_sink.py
          (+78): the invariant-named handler/sink tests (repo uses flat tests/, not tests/voxd/).
        - tests/test_cli.py (+55/-10): record command tests use a RecordResult-returning
          side effect + a one-line-error test.
        - tests/test_voxd_router.py (+2/-1) and tests/test_voxd_synthesis.py (+9/-2): broken
          by the transport change (RecordHandler import moved; _run_record helpers needed
          output_dir + the 'recording' ack drain) and fixed, per "no pre-existing excuse."
        The design doc's nominal test paths (tests/voxd/test_speech_handlers.py, tests/voxd/test_record_sink.py, tests/test_main.py) do not exist in this repo; the real layout is flat tests/test_voxd_*.py and tests/test_cli.py.
        Did NOT run the live-verify session (leader owns it with the operator: real >1 MiB record + audible playback). Left OUT OF SCOPE untouched: remote host:path labeling (vox-eoq9), routing play through the daemon (vox-ovb7), and the session-voice inheritance fix (its own mission -- synthesis.py voice resolution not touched).
