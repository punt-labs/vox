      prose: |
        Round-2 review fixes on fix/vox-tnum-record-transport, commit dff8f0f. All ten findings addressed; make check green; 2756 passed against the installed artifact (7 new tests over round 1).
        MUST FIX: 1 (bwk, blocking) — added test_long_synthesis_is_not_abandoned: a spy on the
          transport captures the record deadline for a 6000-char text and asserts it
          exceeds the observed ~124s (and the old fixed 30s); a revert to fixed 30s
          fails it.
        2 (relative-path regression) — client.record now resolves output_dir and
          output_path to absolute against the caller's cwd (Path.resolve()) before the
          wire, once in the client, so a relative -o no longer lands in voxd's own cwd.
          Test: test_relative_output_resolved_to_absolute.
        3 (CLI stat guard) — the result.path.stat() verification moved inside the
          try/except; an inaccessible path is a one-line "cannot read recording" error,
          not an uncaught OSError traceback. Test: test_record_inaccessible_path_is_one_line_error.
        4 (post-commit attribution) — record_sink.place captures byte_count from the
          temp before the atomic rename, and the ephemeral-source unlink is best-effort
          (suppress OSError); a cleanup failure after the commit no longer fails a
          completed write. Test: test_post_commit_unlink_failure_does_not_fail_write.
        5 (catch width) — record_handler catches Exception (not just OSError) around
          sink.place and emits the error frame, matching the synthesize handler, so a
          non-OSError failure never hangs the already-ack'd client to the full timeout.
        6 (MCP parity) — the record tool verifies size == byte_count like the CLI;
          a mismatch raises VoxdProtocolError and a stat OSError propagates, both caught
          by SegmentBatch.render and degraded to a clear error. Test:
          test_size_mismatch_returns_error (plus the two existing MCP tests updated to
          write the delivered file so the new check has real bytes to stat).

        SHOULD FIX: 7 (timeout cap) — _RECORD_TIMEOUT_MAX = 600s bounds the length-scaled deadline.
          Test: test_record_timeout_is_capped.
        8 (_safe_reply) — narrowed: silent WebSocketDisconnect, debug-logged RuntimeError,
          so a genuine send fault is not swallowed invisibly.
        9 (slots) — RecordResult and SynthesizeResult now @dataclass(frozen=True, slots=True). 10 (invariant 5 in full) — added test_client_close_mid_transfer_daemon_serves_next_connection:
          a TestClient integration test where a client closes after the recording ack,
          then a NEW connection's health request succeeds.

