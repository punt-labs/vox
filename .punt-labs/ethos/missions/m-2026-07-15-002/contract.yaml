context: |
    ## Goal

    Make "no agent narration after a fire-and-forget vox control tool" an
    AUTOMATIC, RELIABLE behavior enforced by the plugin hook — not a soft
    markdown line the agent has to read and remember. The current soft line in
    commands/music.md was observed failing live: after `/music on style trance`
    the agent narrated "Trance pool is generating…", which is redundant with the
    audio panel and off-character for the DJ CX.

    ## Why the hook is the right layer

    hooks/suppress-output.sh is a PostToolUse hook wired (hooks.json matcher
    `mcp__(plugin_vox(-dev)?_)?mic__.*`) to fire on EVERY vox mic tool call. It
    already runs the two-channel display pattern
    (punt-kit/patterns/two-channel-display.md):

      - updatedMCPToolOutput  → the compact ♪ panel line the USER sees
        (DJ-character phrase pools — keep these exactly as-is)
      - additionalContext     → text injected back into the AGENT's context

    The narration bug is entirely in channel 2: for control tools it currently
    hands the agent the raw result JSON, which reads as "here is data, tell the
    user about it," so the agent narrates. The fix is to make additionalContext,
    for control-tool successes, an explicit stop-narration directive. The hook
    fires unconditionally, so this is reliable in a way the markdown line never
    was.

    ## Control vs query split (the whole design)

    CONTROL (fire-and-forget → agent stays silent, panel is the whole response):
      music (all statuses: generating / playing / stopped / other),
      music_play, music_next, vibe, notify, speak, unmute, record.

    QUERY (agent must answer with the data → keep JSON in additionalContext):
      status, who, music_list.

    ## Hard constraints / invariants

    - Do NOT change the user-facing panel line (updatedMCPToolOutput) for any
      tool. The DJ phrase pools are correct and stay verbatim.
    - Do NOT change hooks.json matchers or any other hook.
    - PRESERVE the error guard: on any tool error the failure text must still
      reach additionalContext. The stop-directive is SUCCESS-branch only.
    - suppress-output.sh has NO `set -euo pipefail` on purpose — hooks must
      degrade gracefully on malformed input. Keep that property; do not add it.
    - shellcheck-clean is mandatory (make lint runs it). No disable directives.
    - Bash 3.2 compatible (macOS system bash) — the script already targets it
      (see pick_random). Keep it portable.

    ## Deliverable

    Two commits on fix/vox-lf6b-suppress-control-narration:
      1. suppress-output.sh: control-tool successes emit a stop-narration
         directive in additionalContext; query tools + error path unchanged;
         + a shell test asserting the split and the preserved error path.
      2. commands/music.md: single prominent terminal directive replacing the
         scattered "No text output" lines.
    make check green, shellcheck clean. The leader handles CHANGELOG, PR, review.
