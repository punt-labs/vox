          status: pass
        - name: 'manual: control-tool success (music generating) still gets STOP_NARRATION, DJ panel line intact'
          status: pass
        - name: uv run pytest tests/test_suppress_output.py -v — 8 passed (added uncaught-exception case)
          status: pass
        - name: make check (ruff, format, shellcheck clean, mypy, pyright, markdownlint, 2430 pytest, OO/coupling/suppression ratchets)
          status: pass
      prose: |
        Round-2 HIGH fix: a vox tool raising an UNCAUGHT exception is surfaced by
        FastMCP as a bare non-JSON string ("Error executing tool music: KeyError:
        'style'"). The top error guard (.error // empty) only matched the
        {"error":...} contract, so the bare string fell through to a control-tool
        SUCCESS branch and additionalContext became STOP_NARRATION — a real failure
        reported as a silent success with an explicit stay-silent directive.

        Added a second guard after the error guard. The leader's suggested check
        (jq -r 'type' == "string") does NOT fire here: the bare error text is not
        valid JSON, so `jq type` errors rather than returning "string". Instead I test
        the positive shape — every legitimate success is a JSON object (control) or
        array (record/unmute):

            if [[ -n "$RESULT" ]] && ! echo "$RESULT" | jq -e 'type == "object" or type == "array"' >/dev/null 2>&1; then
              emit "♪ error" "$RESULT"
              exit 0
            fi

        A non-empty RESULT that is neither object nor array (bare string, number,
        bool, or unparseable text) is surfaced as an error and exits before any
        success branch runs. Empty/malformed RESULT is left to the existing
        fallthrough (unchanged). shellcheck-clean, no `set -e`, Bash 3.2 safe, guard
        ends `exit 0`.

        Commit 20ef550 on fix/vox-lf6b-suppress-control-narration, stacked on the two
        round-1 commits (1adbcdf hook+test, 8b5a940 doc). Verified manually both ways
        (error string surfaced; normal success still silenced) and via the new pytest
        case. make check exits 0. CHANGELOG/README/DESIGN/pyproject/PR untouched —
        leader-owned.
