context: |
    ## Problem (verified on the live machine, 2026-07-19)

    v4.12.5 (vox-fdmm) promised "one vox.log". It does not deliver it.
    vox.log = 404 KB; vox-fallback.log = 4.2 MB plus .1/.2/.3 rotations at
    ~5 MB each — the fallback is the largest, freshest file. vox.log only
    holds daemon lines plus lines from clients that opened a daemon
    connection for real work (synthesis/chime). Every hook that does NO
    daemon work (Stop/UserPromptSubmit/SubagentStop skip paths, config
    updates) lands in vox-fallback.log even when the daemon is UP — and
    those are the majority of hook fires.

    ## Root cause

    The fdmm design (docs/logging-proposal.md, rec at line 69) routes client
    log records over the WebSocket the client opens for its actual work, with
    an O_APPEND fallback labeled "daemon-down". Two false premises: (1) not
    every client has a WebSocket — a no-daemon-work hook opens none; (2) the
    fallback is not a daemon-down path — it is the primary path for the
    largest client class. The transport cannot cover connectionless clients.
    The design itself named the connectionless alternative (the vibe-trace
    O_APPEND shared-file line writer) and set it aside.

    ## Candidate approaches (you decide; leader leans B but the design rules)

    - A: no-daemon-work hooks open a brief fire-and-forget connection to ship
      their line. Concern: every fast hook pays a daemon round-trip (DES-017);
      still needs a fallback when the daemon is down — the split survives.
    - B: every process (daemon included) appends directly to one vox.log via
      a multi-writer-safe O_APPEND line writer (pattern proven by the
      vibe-trace append_log path); rotation guarded by flock in the
      size-check-then-rename shape of the DES-013 playback lock. No daemon
      dependency for logging, so no fallback file exists at all. Reopens
      multi-writer rotation, which the flock protocol must close.
    - C: clients append to a local spool the daemon drains into vox.log.
      Daemon stays sole writer/rotator; costs a drain loop, spool lifecycle,
      and latency between event and visibility.

    ## Hard constraints

    - No migration/compat/shim code — delete the fallback path outright
      (forward integration). Punt Labs has no installed base to migrate.
    - Hooks are short-lived subprocesses; their latency budget is the reason
      DES-017 exists. Logging must never block or slow a hook noticeably.
    - 0600 on every log file (cn0p hardening).
    - voxd is the only long-lived process; clients are transient.
    - Rotation: current fallback rotates at ~5 MB x 3; the unified scheme
      must cap total disk while never corrupting concurrent appends.

    ## Deliverable

    A committed design doc (+ Z spec if triggered) that an implementation
    mission can execute without further design decisions. The leader reviews
    it, escalates the rotation/round-trip tradeoff to the operator, and only
    then dispatches implementation. Live-verify on the running machine is
    part of the definition of done for the overall fix.
