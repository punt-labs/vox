context: |
    ## Goal

    Ship the daemon-is-audio-host model, operator-ratified 2026-07-21 as the
    PURE variant: record captures to a daemon-owned store (id/name, no client
    path), play plays a store ref on the daemon host, fetch materializes a store
    ref to a client path (the only verb with -o). This closes the P1 arbitrary-
    write (vox-zu39) by construction, routes play through the daemon (vox-ovb7),
    and gives a coherent remote reference/retrieve (vox-eoq9) — as one change.

    Design of record: docs/vox-dvri-daemon-audio-host.md (commit d1d2bdd on this
    branch), amended by STEP 1 to drop record's -o. Z spec: docs/vox-dvri-record-
    store.tex (fuzz-clean, models the containment invariant).

    ## Why pure (operator ruling)

    record having a delivery `-o` was a second philosophy bolted onto the store
    model. Dropping it leaves one philosophy (capture / play / fetch), removes the
    fragile does-this-path-exist-locally probe from the record hot path, and gives
    record zero client-path surface — the strongest form of the security fix.
    Cost the operator accepted: `vox record -o out.mp3` becomes `vox record` then
    `vox fetch <id> -o out.mp3`; locally the store file is a real file at the path
    record prints, so a second step is usually unnecessary.

    ## Trust model

    voxd may serve remote clients holding the token but in a different trust
    domain (machine B, per docs/guide-remote-setup.md). The SSH tunnel makes a
    remote B a loopback peer, so peer address is NOT a security input. Token =
    audio ops, never filesystem writes/reads as the daemon user.

    ## Cautions

    - voxd logs to a file, never stderr/print.
    - Forward integration only — delete the #351 output_dir/output_path contract
      and record_sink.py; no shim.
    - Preserve local (loopback) ergonomics: `vox record` still yields a usable
      file at the printed store path; `vox play <localfile>` still plays locally.
