context: |
    Two swallowed failures flagged by silent-failure-hunter, both in the "a real failure is logged but the caller reports success" class. Surface them. (1) vox-qogn: the daemon uninstall path calls kill_stale_daemon() but discards its bool return. LaunchdBackend.uninstall() (service/launchd.py, ~line 172) and the ServiceInstaller uninstall path (service/installer.py, ~lines 160-169) both ignore the result, so if kill_pid returns False (PermissionError, or a process owned by another user — process.py:128-133) the daemon survives but `vox daemon uninstall` still reports success ("uninstalled"). The failure is logged at WARNING but the success message is optimistic. (2) vox-wqft: in hooks.py, the `except OSError` block in _chime_via_voxd logs "Could not spawn chime subprocess" with no exception context — no errno/strerror for debugging. You decide the exact mechanism for surfacing (1) — propagate the bool, raise, a non-zero exit, or a clear non-success message — but `vox daemon uninstall` must NOT report plain success when the stale-daemon kill actually failed. Keep the daemon/client boundary intact; do not change unrelated behavior.
