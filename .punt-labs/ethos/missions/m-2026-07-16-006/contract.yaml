context: |
    ## Goal

    Make a mood change re-pool the music when music is playing — via a clean,
    hint-based design (NOT by coupling the vibe tool to playback). vibe() enriches
    its RETURN with a read-only music-status hint + an imperative directive; the
    agent (/vibe skill and the auto-vibe path) reads the hint, authors rich
    (mood x style) prompts, and calls the EXISTING music tool, which re-pools. No
    daemon or state-machine change. Music off -> no hint -> no-op.

    This rests on soft prompt-reliability (the agent must follow the hint), so the
    operator made OBSERVABILITY a core goal: structured [vibe-trace] logs must let
    a human PROVE the chain fires, and equally PROVE whether AUTO-VIBE is working
    (nudge fires + agent responds). A silent gap must be greppable.

    ## Why hint-based (settled)

    vibe() is voice-direction; driving playback from it is a layering violation.
    The return-hint keeps concerns separate: vibe = mood, music = music, agent =
    orchestration. The imperative directive in the return is the STOP_NARRATION-
    style device that makes the soft path reliable.

    ## Invariants / constraints

    - vibe() never posts a music/switch signal — read-only status observation only.
    - No daemon/state-machine change; the music tool's re-pool is unchanged.
    - voxd/server/hooks log to stderr via logger, never print().
    - No migration/compat/shim; delete the old no-coupling comment in vibe() if it
      misleads, but vibe() still does NOTHING to music directly.
    - The [vibe-trace] prefix must be stable and documented so `grep` is the proof.

    ## Deliverable

    feat/vox-q1z4: vibe() return hint + [vibe-trace] logging across nudge/vibe/
    music, /vibe skill author-then-call-music step, docs reconciled, tests for the
    hint + logs, status reflects current vibe+music. make check green, daemon-
    tested. Leader finalizes DES-045 and owns the PR + live verification.
