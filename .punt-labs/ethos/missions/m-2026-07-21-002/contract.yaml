context: |
    ## Problem (reproduced live twice, 2026-07-20, on the merged vox-2594 wheel 4.12.5)

    `vox record -o out.mp3 "<~6000-char text>"` fails. The daemon synthesizes
    and caches the audio correctly (chunk-split at the 4,949-char eleven_v3
    limit, merged to one 6000-char stream), but the reply cannot be delivered:
    the daemon returns the recorded audio as a SINGLE WebSocket message and the
    3,072,047-byte frame exceeds the client's 1 MiB websockets default max_size.
    The client dies with `ConnectionClosedError: sent 1009 (message too big)`
    and the -o file is never written. Second run (cache hit, instant) isolates
    the transport failure from synthesis time. A control 45-char record works
    end-to-end in ~1 second.

    Four stacked defects, all observed:
    1. Transport: single-frame audio return over a 1 MiB-capped channel — any
       record above ~1 MiB is permanently undeliverable.
    2. Timeout: first run — the 6000-char synthesis took 2m04s but the client
       response timeout fired first; daemon finished with no receiver, no file.
    3. CLI error mapping: ConnectionClosedError escapes the record command's
       (VoxdConnectionError, VoxdProtocolError) catch as a full rich traceback.
    4. Daemon-side: on the client's mid-transfer close the daemon raises
       AssertionError in websockets' write_close_frame/drain
       (`uvicorn.error: data transfer failed ... AssertionError`).

    ## Why this is a design mission, not a quick fix

    It crosses the daemon/client boundary and the fix is a protocol/transport
    decision with real tradeoffs (stream-and-reassemble vs. raise the cap vs.
    the daemon writes the file and returns a path vs. binary frames). The COO is
    NOT prescribing a write set — the specialist decides the transport and the
    decomposition. The leader will review the design and escalate the transport
    choice to the operator BEFORE implementation dispatches.

    ## Key asymmetry to weigh

    The play/unmute path never sends audio over the wire — the daemon plays it
    locally via afplay/ffplay. Only `record` (and any client that needs the
    bytes back) must return audio to the caller. Whatever the fix, confirm which
    call sites share the ceiling and whether one change fixes all of them.

    ## Constraints

    - voxd clients are LOCAL same-user processes; browser-origin WS handshakes
      are already rejected (CSWSH defense). State the trust boundary the chosen
      mechanism relies on; do not reintroduce an unbounded-buffer exposure.
    - No migration/compat/shim/bridge — forward-integrate the old return path.
    - Never Read/Write/Bash .punt-labs/vox/vox.md or vox.local.md; never touch
      .punt-labs/ethos/.
    - Deliverable is a committed design doc (+ Z spec if the trigger fires) an
      implementation mission can execute without further design decisions.
