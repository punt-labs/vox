context: |
    Implement the self-driving music playlist per the APPROVED design. Read it first, end to end:
      - DESIGN.md DES-039 (the ADR) AND its "Amendment A" (injected TrackStore).
      - Your design note: .tmp/missions/results/vox-1rxb-design.md (write-set,
        test plan, OO plan).
      - The Z formal model: docs/music-playlist.tex (the state machine + invariants
        the implementation must satisfy; fuzz-clean).
    Work on branch design/vox-1rxb-music-autoadvance (the ADR is already there; code + ADR ship in one PR). Do NOT open the PR — the leader does after a mandatory audio flight with the operator.
    ALL FOUR OPERATOR-LOCKED DECISIONS (non-negotiable): 1. PoolFiller is SCHEDULER-OWNED. turn_off / update_vibe cancel or retarget the
       single fill task synchronously — no orphaned generation after /music off.
    2. Vibe/style change FINISHES the current song, then switches pool (supersedes
       DES-033). Retarget the fill immediately on vibe-change; switch playback at
       the current track's natural end. Do NOT kill the current player on vibe-change.
    3. /music next (and any advance) while the pool is EMPTY (generating-first) is a
       NO-OP — it must NOT call TrackPool.pick_next on an empty pool (that raises).
       This is a real crash path the Z model exposed; it needs a regression test.
    4. INJECTED TrackStore (Amendment A). No hard-coded filesystem in the music
       domain. Define a TrackStore Protocol (in types.py per PY-IC-9) covering all
       disk access — pool enumeration (tracks_for), listing, find-by-name, the
       existence checks the naming counter needs, and the write target for a new
       track. Provide FilesystemTrackStore (store.py) that absorbs the glob/dir
       logic currently in TrackGenerator. Inject it: TrackGenerator (and via the
       scheduler, PoolFiller) take the store through their constructor; daemon.py
       wires FilesystemTrackStore. Tests inject an in-memory fake store.

    Also: the turn_on / restart / vibe-switch "given the on-disk count, pick the entry state and start-or-skip the fill" decision must be ONE shared method, not duplicated three ways (Z finding #3 — DRY and the OO extraction the plan wants).
    Auto-advance and manual skip share the pure select_next_track selection (Z: TrackEnds == Skip == Advance). Advance lives in the loop's proc-end branch; the scheduler exposes only the pure selection. The single-track loop-then-advance edge falls out of pick_next (no special-casing). Reuse TrackPool / TrackGenerator generation + deterministic naming verbatim.
