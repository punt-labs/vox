      prose: |
        Self-driving playlist per DES-039 + Amendment A, landed green as one
        coherent commit (0a35455) on design/vox-1rxb-music-autoadvance.

        Decomposition: store.py (TrackStore protocol + FilesystemTrackStore, the one
        disk seam), filler.py (PoolFiller — one cancellable sequential fill task),
        playlist.py (Playlist — pool identity + fill supply + next-track selection),
        scheduler.py (session state + domain commands + control channel, owns
        Playlist), loop.py (spawn player, race proc-end vs control, advance-on-end).

        Behavior fixed: track-end auto-advances to a different pool member;
        background fill tops the pool to POOL_SIZE sequentially; rotate-at-12 at zero
        credits; vibe change finishes current song then switches pool; /music off
        cancels the fill synchronously (no orphan). The empty-pool skip no-op (Z
        finding #1) is guarded and regression-tested.

        OO: loop.py 385->163 lines & CC 14->6 (two FAIL->PASS); scheduler.py CC 11->5
        & LCOM improved; new modules all-PASS. Resolved the ratchet WITHOUT
        --rebaseline by keeping types.py/__init__.py byte-identical to HEAD and
        fixing the two store-seam micro-regressions (generator avg_params via
        auto_track_name(tuple); daemon module_size via a dead comment). check-oo
        reports genuine improvement, zero regressions.

        Retired 3 old-model test files (superseded by DES-039) after migrating every
        still-valid case first — no coverage loss (slugify/auto_track_name/list ->
        test_generator+test_store; field-defaults/kill_proc/lost-wakeup ->
        test_scheduler).

